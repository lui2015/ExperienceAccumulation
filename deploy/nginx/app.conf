# 经验沉淀（Experience Accumulation）Nginx 片段
#
# 用法：将以下 location 块合并进现有 www.luliming.xyz 的 server 块
#       （线上为 /etc/nginx/conf.d/luliming.conf，Certbot 托管 SSL）。
#       不要整文件复制，否则会覆盖同文件中的其他应用（博客 / FilmAnalysis 等）。

    # 根路径补全斜杠
    location = /experience { return 301 /experience/; }

    # 后端 API：反代到本地 8094
    location /experience/api/ {
        proxy_pass http://127.0.0.1:8094/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # HTML 文件直出（同域，无独立沙箱子域）
    location /experience/files/html/ {
        proxy_pass http://127.0.0.1:8094/files/html/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # 健康检查
    location = /experience/healthz {
        proxy_pass http://127.0.0.1:8094/healthz;
    }

    # 前端静态文件（构建产物放 /opt/experience/frontend/）
    # 注意：不要用 alias + try_files —— alias 会把 /experience/ 前缀重复拼进路径，
    #       导致 /experience/assets/*.js 实际指向 .../frontend/experience/assets/*.js 而 404，
    #       进而页面白屏。改用 root + rewrite 剥离前缀；根路径用精确 location 直接返回 index.html。
    location = /experience/ {
        root /opt/experience/frontend;
        try_files /index.html =404;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location /experience/ {
        root /opt/experience/frontend;
        rewrite ^/experience/(.*)$ /$1 break;
        index index.html;
        try_files $uri $uri/ /experience/index.html;
        add_header X-Content-Type-Options "nosniff" always;
    }
