# 主站 + API：www.luliming.xyz
# 假设网站根目录由其他配置已经设置；这里只追加 /experience 这部分。
#
# 用法：把这段内容合并到现有 luliming.xyz 的 server 块里，或单独放在 conf.d/

server {
    listen 443 ssl http2;
    server_name www.luliming.xyz;

    ssl_certificate     /etc/letsencrypt/live/luliming.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luliming.xyz/privkey.pem;

    # 限制单次请求体（HTML 20MB + 余量）
    client_max_body_size 25m;

    # ===== 经验沉淀 - 前端静态文件 =====
    # 前端 build 后产物放在这里
    location /experience/ {
        alias /var/www/experience/frontend/;
        try_files $uri $uri/ /experience/index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "same-origin" always;
    }

    # ===== 经验沉淀 - 后端 API =====
    # 前端 axios 走 /api/v1，但因为前端挂在 /experience，构建产物里的 fetch 会请求
    # /experience/api/v1/...。所以这里把 /experience/api 反代到 :8000/api
    location /experience/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # 经验沉淀 - 健康检查（可选）
    location = /experience/healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
    }
}

# HTTP -> HTTPS
server {
    listen 80;
    server_name www.luliming.xyz luliming.xyz;
    return 301 https://www.luliming.xyz$request_uri;
}
