# HTML 沙箱域：view.luliming.xyz
# **必须使用独立的二级域名**，与主站 Cookie 严格隔离，是 XSS 防护的核心。
#
# DNS：在域名后台为 view 添加 A 记录，指向同一台服务器即可。
# 证书：用 certbot 申请 view.luliming.xyz 的证书：
#   sudo certbot --nginx -d view.luliming.xyz

server {
    listen 443 ssl http2;
    server_name view.luliming.xyz;

    ssl_certificate     /etc/letsencrypt/live/view.luliming.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/view.luliming.xyz/privkey.pem;

    # HTML 沙箱：只暴露 /files/html/{token}，其他一律 404
    location /files/html/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 双重保险：响应头上也加沙箱保护
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        # 允许仅被主站嵌入（如未来要在主站内嵌 iframe 预览）
        add_header Content-Security-Policy "frame-ancestors 'self' https://www.luliming.xyz" always;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name view.luliming.xyz;
    return 301 https://$host$request_uri;
}
