<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="cc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06070d"/>
      <stop offset="100%" stop-color="#0b1330"/>
    </linearGradient>
    <radialGradient id="cc-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#cc-bg)"/>
  <rect width="800" height="450" fill="url(#cc-glow)"/>

  <!-- Circuit traces -->
  <g fill="none" stroke="#00e5ff" stroke-width="1.4" opacity="0.85">
    <path d="M 0 80 H 180 V 140 H 360 V 60 H 540 V 200 H 800"/>
    <path d="M 0 240 H 120 V 320 H 280 V 260 H 460 V 380 H 620 V 300 H 800"/>
    <path d="M 0 410 H 220 V 350 H 400 V 410 H 800"/>
    <path d="M 80 0 V 60 H 200 V 0"/>
    <path d="M 480 0 V 100 H 600 V 0"/>
    <path d="M 720 0 V 50"/>
  </g>
  <g fill="none" stroke="#7c5cff" stroke-width="1" opacity="0.55">
    <path d="M 0 160 H 240 V 100 H 420 V 180 H 800"/>
    <path d="M 0 300 H 80 V 380 H 240"/>
    <path d="M 560 450 V 380 H 700 V 450"/>
  </g>

  <!-- Nodes -->
  <g fill="#ff2ec3">
    <circle cx="180" cy="80" r="4"/>
    <circle cx="360" cy="60" r="4"/>
    <circle cx="540" cy="200" r="4"/>
    <circle cx="280" cy="260" r="4"/>
    <circle cx="460" cy="380" r="4"/>
    <circle cx="220" cy="350" r="4"/>
    <circle cx="400" cy="410" r="4"/>
  </g>
  <g fill="#c5ff00">
    <circle cx="120" cy="320" r="3"/>
    <circle cx="620" cy="300" r="3"/>
    <circle cx="200" cy="60" r="3"/>
    <circle cx="600" cy="100" r="3"/>
  </g>

  <!-- Central chip -->
  <g transform="translate(330,165)">
    <rect width="140" height="120" rx="6" fill="#11142a" stroke="#ff2ec3" stroke-width="2"/>
    <rect x="14" y="14" width="112" height="92" rx="3" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.7"/>
    <text x="70" y="72" text-anchor="middle" font-family="JetBrains Mono, Menlo, monospace" font-size="22" fill="#00e5ff" letter-spacing="3">CPU</text>
    <!-- pins -->
    <g fill="#7c5cff">
      <rect x="-8" y="20" width="8" height="4"/><rect x="-8" y="40" width="8" height="4"/><rect x="-8" y="60" width="8" height="4"/><rect x="-8" y="80" width="8" height="4"/><rect x="-8" y="100" width="8" height="4"/>
      <rect x="140" y="20" width="8" height="4"/><rect x="140" y="40" width="8" height="4"/><rect x="140" y="60" width="8" height="4"/><rect x="140" y="80" width="8" height="4"/><rect x="140" y="100" width="8" height="4"/>
      <rect x="20" y="-8" width="4" height="8"/><rect x="40" y="-8" width="4" height="8"/><rect x="60" y="-8" width="4" height="8"/><rect x="80" y="-8" width="4" height="8"/><rect x="100" y="-8" width="4" height="8"/><rect x="120" y="-8" width="4" height="8"/>
      <rect x="20" y="120" width="4" height="8"/><rect x="40" y="120" width="4" height="8"/><rect x="60" y="120" width="4" height="8"/><rect x="80" y="120" width="4" height="8"/><rect x="100" y="120" width="4" height="8"/><rect x="120" y="120" width="4" height="8"/>
    </g>
  </g>
</svg>
