    <g opacity="0.7"><text x="100" y="100">0</text><text x="100" y="120">1</text><text x="100" y="140">B</text><text x="100" y="160">2</text><text x="100" y="180">5</text><text x="100" y="200">E</text><text x="100" y="220">9</text><text x="100" y="240">1</text><text x="100" y="260">0</text></g>
    <g opacity="0.4"><text x="160" y="40">F</text><text x="160" y="60">A</text><text x="160" y="80">C</text><text x="160" y="100">2</text><text x="160" y="120">0</text><text x="160" y="140">1</text><text x="160" y="160">B</text></g>
    <g opacity="0.85"><text x="220" y="80">0</text><text x="220" y="100">x</text><text x="220" y="120">7</text><text x="220" y="140">F</text><text x="220" y="160">F</text><text x="220" y="180">A</text><text x="220" y="200">A</text><text x="220" y="220">5</text><text x="220" y="240">C</text><text x="220" y="260">3</text><text x="220" y="280">2</text></g>
    <g opacity="0.5"><text x="280" y="140">1</text><text x="280" y="160">0</text><text x="280" y="180">1</text><text x="280" y="200">0</text><text x="280" y="220">1</text></g>
    <g opacity="0.7"><text x="340" y="60">B</text><text x="340" y="80">A</text><text x="340" y="100">A</text><text x="340" y="120">D</text><text x="340" y="140">F</text><text x="340" y="160">0</text><text x="340" y="180">0</text><text x="340" y="200">D</text></g>
    <g opacity="0.45"><text x="400" y="40">3</text><text x="400" y="60">3</text><text x="400" y="80">7</text><text x="400" y="100">7</text></g>
    <g opacity="0.85"><text x="460" y="120">D</text><text x="460" y="140">E</text><text x="460" y="160">A</text><text x="460" y="180">D</text><text x="460" y="200">B</text><text x="460" y="220">E</text><text x="460" y="240">E</text><text x="460" y="260">F</text></g>
    <g opacity="0.55"><text x="520" y="80">C</text><text x="520" y="100">A</text><text x="520" y="120">F</text><text x="520" y="140">E</text><text x="520" y="160">B</text><text x="520" y="180">A</text><text x="520" y="200">B</text><text x="520" y="220">E</text></g>
    <g opacity="0.7"><text x="580" y="180">F</text><text x="580" y="200">E</text><text x="580" y="220">E</text><text x="580" y="240">D</text><text x="580" y="260">B</text><text x="580" y="280">E</text><text x="580" y="300">E</text><text x="580" y="320">F</text></g>
