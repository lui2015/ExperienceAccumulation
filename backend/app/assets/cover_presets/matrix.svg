      <stop offset="0%" stop-color="#02100a"/>
      <stop offset="100%" stop-color="#06070d"/>
    </linearGradient>
    <linearGradient id="mx-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c5ff00" stop-opacity="0"/>
      <stop offset="60%" stop-color="#c5ff00" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c5ff00"/>
