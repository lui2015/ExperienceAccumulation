<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sk-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="55%" stop-color="#3a0d50"/>
      <stop offset="100%" stop-color="#06070d"/>
    </linearGradient>
    <linearGradient id="sk-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="50%" stop-color="#ff2ec3"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="sk-fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff2ec3" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff2ec3" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#sk-bg)"/>

  <!-- Sun -->
  <circle cx="600" cy="180" r="80" fill="url(#sk-sun)" opacity="0.95"/>
  <circle cx="600" cy="180" r="80" fill="none" stroke="#fde047" stroke-width="1" opacity="0.35"/>
  <circle cx="600" cy="180" r="100" fill="none" stroke="#ff2ec3" stroke-width="1" opacity="0.25"/>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="100" cy="50" r="1.2"/><circle cx="220" cy="80" r="1"/><circle cx="320" cy="40" r="1.2"/>
    <circle cx="450" cy="70" r="1"/><circle cx="700" cy="40" r="1"/><circle cx="760" cy="90" r="1.2"/>
  </g>

  <!-- Far skyline -->
  <g fill="#3a0d50">
    <rect x="0" y="240" width="60" height="120"/>
    <rect x="60" y="220" width="80" height="140"/>
    <rect x="140" y="260" width="50" height="100"/>
    <rect x="190" y="200" width="70" height="160"/>
    <rect x="260" y="240" width="60" height="120"/>
    <rect x="320" y="210" width="90" height="150"/>
    <rect x="410" y="250" width="50" height="110"/>
    <rect x="460" y="220" width="60" height="140"/>
    <rect x="520" y="260" width="60" height="100"/>
    <rect x="580" y="230" width="80" height="130"/>
    <rect x="660" y="250" width="50" height="110"/>
    <rect x="710" y="220" width="90" height="140"/>
  </g>

  <!-- Near skyline -->
  <g fill="#0b0d18" stroke="#ff2ec3" stroke-width="1">
    <rect x="0" y="290" width="80" height="160"/>
    <rect x="80" y="270" width="60" height="180"/>
    <rect x="140" y="310" width="70" height="140"/>
    <rect x="210" y="260" width="90" height="190"/>
    <rect x="300" y="300" width="60" height="150"/>
    <rect x="360" y="280" width="80" height="170"/>
    <rect x="440" y="320" width="50" height="130"/>
    <rect x="490" y="270" width="80" height="180"/>
    <rect x="570" y="300" width="60" height="150"/>
    <rect x="630" y="280" width="80" height="170"/>
    <rect x="710" y="310" width="90" height="140"/>
  </g>

  <!-- Windows -->
  <g fill="#fde047" opacity="0.9">
    <rect x="20" y="310" width="6" height="6"/><rect x="36" y="310" width="6" height="6"/><rect x="52" y="310" width="6" height="6"/>
    <rect x="20" y="330" width="6" height="6"/><rect x="36" y="330" width="6" height="6"/>
    <rect x="20" y="370" width="6" height="6"/><rect x="52" y="370" width="6" height="6"/>
    <rect x="100" y="290" width="6" height="6"/><rect x="116" y="290" width="6" height="6"/>
    <rect x="100" y="320" width="6" height="6"/><rect x="116" y="320" width="6" height="6"/>
    <rect x="100" y="360" width="6" height="6"/>
    <rect x="230" y="280" width="6" height="6"/><rect x="246" y="280" width="6" height="6"/><rect x="262" y="280" width="6" height="6"/><rect x="278" y="280" width="6" height="6"/>
    <rect x="230" y="310" width="6" height="6"/><rect x="262" y="310" width="6" height="6"/>
    <rect x="230" y="350" width="6" height="6"/><rect x="278" y="350" width="6" height="6"/>
    <rect x="380" y="300" width="6" height="6"/><rect x="396" y="300" width="6" height="6"/><rect x="412" y="300" width="6" height="6"/>
    <rect x="380" y="340" width="6" height="6"/><rect x="412" y="340" width="6" height="6"/>
    <rect x="510" y="290" width="6" height="6"/><rect x="526" y="290" width="6" height="6"/><rect x="542" y="290" width="6" height="6"/>
    <rect x="510" y="330" width="6" height="6"/><rect x="542" y="330" width="6" height="6"/>
    <rect x="650" y="300" width="6" height="6"/><rect x="666" y="300" width="6" height="6"/><rect x="682" y="300" width="6" height="6"/>
    <rect x="650" y="340" width="6" height="6"/><rect x="682" y="340" width="6" height="6"/>
    <rect x="730" y="330" width="6" height="6"/><rect x="746" y="330" width="6" height="6"/><rect x="762" y="330" width="6" height="6"/>
  </g>
  <g fill="#00e5ff" opacity="0.95">
    <rect x="68" y="310" width="6" height="6"/>
    <rect x="200" y="290" width="6" height="6"/>
    <rect x="396" y="320" width="6" height="6"/>
    <rect x="558" y="320" width="6" height="6"/>
    <rect x="666" y="370" width="6" height="6"/>
    <rect x="746" y="360" width="6" height="6"/>
  </g>

  <!-- Ground fog -->
  <rect x="0" y="380" width="800" height="70" fill="url(#sk-fog)"/>

  <!-- Antenna lights -->
  <g fill="#ff2ec3">
    <circle cx="240" cy="258" r="2"/>
    <circle cx="395" cy="278" r="2"/>
    <circle cx="525" cy="268" r="2"/>
  </g>
</svg>
